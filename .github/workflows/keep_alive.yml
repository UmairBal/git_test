name: Keep Space Alive
on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          curl -I -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" https://ubaloch1313-futures-bot.hf.space

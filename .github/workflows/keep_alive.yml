name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping HuggingFace Space with retries
        run: |
          URL="https://ubaloch1313-futures-bot.hf.space"
          TOKEN="${{ secrets.HF_TOKEN }}"

          for i in {1..5}; do
            echo "Attempt $i..."

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$URL")

            echo "HTTP Status: $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Space is awake ✅"
              exit 0
            fi

            echo "Space sleeping or loading, retrying in 20s..."
            sleep 20
          done

          echo "Finished attempts."
